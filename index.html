<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Musk - All for one, One for all</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .kanban-column { min-height: 70vh; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="lucide-shield-check"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">3Musk <span class="text-indigo-600 text-sm font-medium">Dashboard</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="member-badges" class="flex -space-x-2">
                <!-- Members will be injected here -->
            </div>
            <button id="add-task-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                <i class="lucide-plus text-sm"></i> Thêm Task
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-sm text-gray-500 font-medium mb-1">Tổng số Task</p>
                <h3 id="stat-total" class="text-3xl font-bold">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-sm text-gray-500 font-medium mb-1">Đang thực hiện</p>
                <h3 id="stat-progress" class="text-3xl font-bold text-blue-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-sm text-gray-500 font-medium mb-1">Đã hoàn thành</p>
                <h3 id="stat-done" class="text-3xl font-bold text-green-600">0</h3>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Todo Column -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-bold text-gray-700 flex items-center gap-2">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span> Cần làm
                    </h2>
                    <span id="count-todo" class="bg-gray-200 text-gray-600 text-xs font-bold px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-todo" class="kanban-column bg-gray-100/50 rounded-xl p-3 border-2 border-dashed border-gray-200 flex flex-col gap-3"></div>
            </div>

            <!-- In Progress Column -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-bold text-gray-700 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Đang làm
                    </h2>
                    <span id="count-progress" class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-progress" class="kanban-column bg-blue-50/30 rounded-xl p-3 border-2 border-dashed border-blue-100 flex flex-col gap-3"></div>
            </div>

            <!-- Done Column -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="font-bold text-gray-700 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span> Hoàn thành
                    </h2>
                    <span id="count-done" class="bg-green-100 text-green-600 text-xs font-bold px-2 py-1 rounded-full">0</span>
                </div>
                <div id="col-done" class="kanban-column bg-green-50/30 rounded-xl p-3 border-2 border-dashed border-green-100 flex flex-col gap-3"></div>
            </div>
        </div>
    </main>

    <!-- Modal Task -->
    <div id="task-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Thêm Task mới</h2>
            <form id="task-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Tiêu đề</label>
                    <input type="text" id="task-title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Mô tả</label>
                    <textarea id="task-desc" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Người thực hiện</label>
                    <select id="task-assignee" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        <!-- Members will be injected here -->
                    </select>
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" id="close-modal" class="px-6 py-2 text-sm font-semibold text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">Hủy</button>
                    <button type="submit" class="px-6 py-2 text-sm font-semibold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">Tạo Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
